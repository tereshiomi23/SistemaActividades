<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerencia de Desarrollo Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-corporativo: #007bff;
            --blanco-puro: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Evita scrolls innecesarios */
        }

        /* CONTENEDOR DE LA IMAGEN DE FONDO */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ajusta la ruta a tu carpeta static de Flask */
            background-image: url('/static/fondo_desarrollo_social.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* CAPA OSCURA SUTIL PARA RESALTAR EL LOGIN */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2); /* Oscurece un poco la imagen */
            z-index: -1;
        }

        /* TARJETA DE LOGIN (ESTILO GLASSMORPHISM) */
        .login-card {
            background: rgba(255, 255, 255, 0.3); /* Transparencia equilibrada */
            backdrop-filter: blur(15px); /* El efecto de vidrio esmerilado */
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            color: #ffffff; /* Texto blanco para resaltar sobre el vidrio */
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* INPUTS LIMPIOS */
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            color: #333;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.2);
        }

        /* BOTÓN AZUL IDÉNTICO AL DE TU REFERENCIA */
        button {
            width: 100%;
            background: var(--azul-corporativo);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .forgot-password {
            display: block;
            margin-top: 20px;
            color: #ffffff;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
        }

        .forgot-password:hover {
            text-decoration: underline;
            opacity: 1;
        }

        /* Alertas de error de Flask */
        .alert {
            background: rgba(231, 76, 60, 0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="background-overlay"></div>

    <div class="login-card">
        <h2>Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Iniciar Sesión</button>
            <a href="#" class="forgot-password">Forget your password?</a>
        </form>
    </div>

</body>
</html>
