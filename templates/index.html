<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Pequiven - Desarrollo Social</title>
    <style>
        :root { --azul: #004a99; --azul-dark: #003366; --fondo: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: var(--azul); text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--azul); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { resize: vertical; }
        .photo-section { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed var(--azul); margin-top: 20px; }
        .photo-section label { color: var(--azul); }
        button { width: 100%; background: var(--azul); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: var(--azul-dark); }
        .alert { padding: 12px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .footer { text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .footer a { color: var(--azul); text-decoration: none; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro de Actividades Diarias</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Fecha de la Actividad:</label>
                <input type="date" name="fecha_actividad" required>
            </div>

            <div class="form-group">
                <label>Programa de Gestión:</label>
                <select id="programa" name="programa_gestion" onchange="actualizarActividades()" required>
                    <option value="">Seleccione el programa...</option>
                    <option value="Pequiven va a la escuela">Pequiven va a la escuela</option>
                    <option value="Pequivoluntades">Pequivoluntades</option>
                    <option value="Fort. de la Gest. Comunitario">Fort. de la Gest. Comunitario</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipo de Actividad:</label>
                <select id="tipo_actividad" name="tipo_actividad" required>
                    <option value="">Esperando programa...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre de la Institución / Comunidad:</label>
                <input type="text" name="nombre_institucion" placeholder="Ej: E.B.N. Carabobo" required>
            </div>

            <div class="form-group">
                <label>Descripción de la Actividad:</label>
                <textarea name="descripcion_actividad" rows="3" placeholder="Indique brevemente qué se realizó..." required></textarea>
            </div>

            <div class="form-group">
                <label>Personal que Asistió:</label>
                <textarea name="personal_asistio" rows="2" placeholder="Nombres de los responsables..." required></textarea>
            </div>

            <div class="form-group">
                <label>Dirección:</label>
                <input type="text" name="direccion" placeholder="Estado, municipio, sector..." required>
            </div>

            <div class="form-group">
                <label>Cantidad de Beneficiarios:</label>
                <input type="number" name="cantidad_beneficiarios" value="0" min="0">
            </div>

            <div class="photo-section">
                <label>Evidencias Fotográficas (Máximo 3):</label>
                <div class="form-group">
                    <input type="file" name="foto1" accept="image/*" style="margin-bottom: 8px;">
                    <input type="file" name="foto2" accept="image/*" style="margin-bottom: 8px;">
                    <input type="file" name="foto3" accept="image/*">
                </div>
                <small style="color: #666;">Formatos permitidos: JPG, PNG, JPEG.</small>
            </div>

            <button type="submit">Guardar Registro y Fotos 💾</button>
        </form>

        <div class="footer">
            <a href="/consultar">📊 Ver Historial</a> | 
            <a href="/logout" style="color: #c9302c;">Cerrar Sesión</a>
        </div>
    </div>

    <script>
        function actualizarActividades() {
            const programa = document.getElementById("programa").value;
            const tipoSelect = document.getElementById("tipo_actividad");
            tipoSelect.innerHTML = "";

            if (programa === "Pequiven va a la escuela") {
                const opt = document.createElement("option");
                opt.value = "Pequiven va a la escuela";
                opt.textContent = "Pequiven va a la escuela";
                tipoSelect.appendChild(opt);
            } 
            else if (programa === "Pequivoluntades") {
                const opt = document.createElement("option");
                opt.value = "Pequivoluntades";
                opt.textContent = "Pequivoluntades";
                tipoSelect.appendChild(opt);
            } 
            else if (programa === "Fort. de la Gest. Comunitario") {
                const opciones = [
                    "Ayuda Médica", 
                    "Ayuda Social", 
                    "Ayuda Técnica", 
                    "Actividades Comunitarias", 
                    "Inspecciones Técnicas", 
                    "Reuniones Intersectoriales"
                ];
                opciones.forEach(t => {
                    const opt = document.createElement("option");
                    opt.value = t;
                    opt.textContent = t;
                    tipoSelect.appendChild(opt);
                });
            } else {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "Seleccione primero el programa...";
                tipoSelect.appendChild(opt);
            }
        }
    </script>
</body>
</html>
